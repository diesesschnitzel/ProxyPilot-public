name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app (unsigned)
        run: |
          xcodebuild \
            -scheme EchoGate \
            -configuration Release \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Copy app
        run: |
          APP_PATH=$(find ./build -name "EchoGate.app" -maxdepth 6 | head -1)
          cp -R "$APP_PATH" ./EchoGate.app

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "EchoGate" \
            -srcfolder EchoGate.app \
            -ov -format UDZO \
            EchoGate.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: EchoGate.dmg
          body: |
            ## EchoGate ${{ github.ref_name }}

            Download `EchoGate.dmg`, open it, drag EchoGate to Applications.
            First launch: right-click → Open to bypass Gatekeeper.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
