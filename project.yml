name: EchoGate
# ── CHANGE bundleIdPrefix to your own reverse-domain identifier ──────
# See BUILDING.md for instructions.
options:
  bundleIdPrefix: de.codecho
  deploymentTarget:
    macOS: "15.0"
packages:
  ProxyPilotCore:
    path: ProxyPilotCore

settings:
  base:
    SWIFT_VERSION: 6.0
    MARKETING_VERSION: "1.0.2"
    CURRENT_PROJECT_VERSION: "5"
targets:
  EchoGate:
    type: application
    platform: macOS
    sources:
      - path: ProxyPilot
    resources:
      - path: ProxyPilot/Assets.xcassets
      - path: ProxyPilot/Localizable.xcstrings
      - path: ProxyPilot/Resources/verified-models.json
    dependencies:
      - package: ProxyPilotCore
        product: ProxyPilotCore
    info:
      path: ProxyPilot/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSApplicationCategoryType: public.app-category.developer-tools
        NSHumanReadableCopyright: ""
        NSHumanReadableDescription: "EchoGate — local proxy for Xcode Agent. Supports Alibaba Coding, z.ai, OpenRouter, OpenAI, Google, xAI, Chutes, Groq and more."
        NSSupportsAutomaticTermination: true
        NSSupportsSuddenTermination: true
    settings:
      base:
        PRODUCT_NAME: EchoGate
        PRODUCT_BUNDLE_IDENTIFIER: de.codecho.EchoGate
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  EchoGateTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ProxyPilotTests
    dependencies:
      - target: EchoGate
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: de.codecho.EchoGateTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/EchoGate.app/Contents/MacOS/EchoGate"
        BUNDLE_LOADER: "$(TEST_HOST)"
